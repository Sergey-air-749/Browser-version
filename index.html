<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Browser-version</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <label id='info'>Информация о браузере: </label>

  <label id='info-full'>Информация о браузере: </label>

  <div class="Browser-version-panel" id="Browser-version-panel">


    <label class="Browser-version" id="Browser-version-userAgent"></label>

    <label class="Browser-version" id="Browser-version-appVersion"></label>

    <label class="Browser-version" id="Browser-version-platform"></label>
  </div>

  <label>location:</label>

  <div class="Browser-version-panel" id="Browser-version-panel">
    <label class="Browser-version" id="Browser-version-location">URL: </label>

    <label class="Browser-version" id="Browser-version-host">host: </label>

    <label class="Browser-version" id="Browser-version-hostname">hostname: </label>

    <label class="Browser-version" id="Browser-version-href">href: </label>

    <label class="Browser-version" id="Browser-version-origin">origin: </label>




    <label class="Browser-version" id="Browser-version-protocol">protocol: </label>

    <label class="Browser-version" id="Browser-version-port">port: </label>

    <label class="Browser-version" id="Browser-version-pathname">pathname: </label>

  </div>

  <script src="script.js"></script>
</body>

</html>
